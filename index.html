<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>모의고사 기록부</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif KR', serif;
      background: #f5f0e8;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
    }

    .container { max-width: 980px; margin: 0 auto; }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid #1a1a1a;
      margin-bottom: 24px;
    }
    .tab-btn {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.95rem;
      padding: 10px 20px;
      border: 2px solid transparent;
      border-bottom: none;
      background: transparent;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      transition: background 0.15s;
    }
    .tab-btn.active { background: #1a1a1a; color: #f5f0e8; border-color: #1a1a1a; }
    .tab-btn:not(.active):hover { background: #e0d9cc; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 폼 ── */
    .form-card {
      background: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      padding: 28px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group.third { grid-column: span 1; }

    label { font-size: 0.85rem; font-weight: 600; color: #444; }
    input, select, textarea {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.95rem;
      padding: 9px 12px;
      border: 1.5px solid #bbb;
      border-radius: 5px;
      background: #faf8f4;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #1a1a1a; }
    textarea { resize: vertical; min-height: 90px; }

    .radio-group { display: flex; gap: 20px; align-items: center; padding: 9px 0; flex-wrap: wrap; }
    .radio-group label {
      font-size: 0.95rem; font-weight: 400;
      display: flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .radio-group input[type="radio"] { width: 16px; height: 16px; cursor: pointer; }

    .three-col {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .btn-submit {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 20px;
      padding: 12px 0;
      width: 100%;
      background: #1a1a1a;
      color: #f5f0e8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }

    /* ── 로딩 스피너 ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #f5f0e8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #f5f0e8;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c0392b; }

    /* ── 필터 바 ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-bar select, .filter-bar input {
      font-size: 0.88rem;
      padding: 7px 10px;
    }
    .filter-label { font-size: 0.85rem; font-weight: 600; color: #444; }

    /* ── 요약 카드 ── */
    .summary-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .summary-card {
      flex: 1;
      min-width: 130px;
      background: #fff;
      border: 1.5px solid #1a1a1a;
      border-radius: 8px;
      padding: 14px 16px;
      text-align: center;
    }
    .summary-card .s-label { font-size: 0.78rem; color: #666; margin-bottom: 4px; }
    .summary-card .s-value { font-size: 1.5rem; font-weight: 700; }

    /* ── 그룹 블록 ── */
    .group-block {
      margin-bottom: 28px;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
    }
    .group-header {
      background: #1a1a1a;
      color: #f5f0e8;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .group-header h3 { font-size: 1rem; font-weight: 600; }
    .group-header .g-meta { font-size: 0.82rem; opacity: 0.75; }
    .group-header .toggle-icon { font-size: 1rem; transition: transform 0.2s; }
    .group-header.collapsed .toggle-icon { transform: rotate(-90deg); }
    .group-body.hidden { display: none; }

    /* ── 기록 카드 ── */
    .record-card {
      border-bottom: 1px solid #ddd;
      padding: 16px 18px;
    }
    .record-card:last-child { border-bottom: none; }
    .record-card:hover { background: #faf8f4; }

    .record-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }
    .record-title { font-size: 1rem; font-weight: 600; }
    .record-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1.5px solid;
    }
    .badge-subject  { border-color: #5a7db5; color: #5a7db5; }
    .badge-done     { border-color: #2a8a4a; color: #2a8a4a; }
    .badge-undone   { border-color: #c0392b; color: #c0392b; }
    .badge-partial  { border-color: #e67e22; color: #e67e22; }
    .badge-grade    { border-color: #8e44ad; color: #8e44ad; }

    .record-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.88rem;
      color: #444;
      margin-bottom: 6px;
    }
    .record-meta span strong { color: #1a1a1a; }

    .record-reflection {
      font-size: 0.88rem;
      color: #555;
      background: #f5f0e8;
      border-left: 3px solid #bbb;
      padding: 7px 12px;
      border-radius: 0 4px 4px 0;
      margin-top: 8px;
      white-space: pre-wrap;
    }

    .btn-delete {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.78rem;
      padding: 4px 10px;
      background: transparent;
      color: #c0392b;
      border: 1.5px solid #c0392b;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: #c0392b; color: #fff; }

    .empty-msg {
      text-align: center;
      padding: 48px 0;
      color: #888;
      font-size: 0.95rem;
    }

    /* ── 통계 테이블 ── */
    .stat-table-wrap { overflow-x: auto; margin-bottom: 28px; }
    .stat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      background: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
    }
    .stat-table thead tr { background: #1a1a1a; color: #f5f0e8; }
    .stat-table th { padding: 10px 14px; text-align: center; }
    .stat-table th:first-child { text-align: left; }
    .stat-table td { padding: 9px 14px; border-top: 1px solid #ddd; text-align: center; }
    .stat-table td:first-child { text-align: left; font-weight: 600; }
    .stat-table tbody tr:hover { background: #faf8f4; }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 12px;
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .three-col { grid-template-columns: 1fr 1fr; }
      .summary-card .s-value { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📓 모의고사 기록부</h1>
  <p class="subtitle">모의고사 풀이 현황, 점수, 등급, 오답, 반성 사항을 체계적으로 관리하세요.</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab-add')">✏️ 기록 추가</button>
    <button class="tab-btn" onclick="switchTab('tab-list')">📋 기록 보기</button>
    <button class="tab-btn" onclick="switchTab('tab-stats')">📊 통계</button>
  </div>

  <!-- ══════════════ 기록 추가 ══════════════ -->
  <div id="tab-add" class="tab-panel active">
    <div class="form-card">
      <div class="form-grid">

        <div class="form-group">
          <label for="examName">모의고사 이름</label>
          <input type="text" id="examName" placeholder="예) 인간실격모의고사" list="examNameList" autocomplete="off"/>
          <datalist id="examNameList"></datalist>
        </div>

        <div class="form-group">
          <label for="examRound">회차</label>
          <input type="number" id="examRound" placeholder="예) 1" min="1" max="99"/>
        </div>

        <div class="form-group">
          <label for="subject">과목</label>
          <select id="subject">
            <option value="">-- 선택 --</option>
            <option>국어</option>
            <option>수학</option>
            <option>영어</option>
            <option>한국사</option>
            <option>사회탐구</option>
            <option>과학탐구</option>
            <option>직업탐구</option>
            <option>제2외국어/한문</option>
            <option>기타</option>
          </select>
        </div>

        <div class="form-group">
          <label for="examDate">시험 날짜</label>
          <input type="date" id="examDate"/>
        </div>

        <!-- 점수 / 등급 / 틀린 문항 수 -->
        <div class="three-col">
          <div class="form-group">
            <label for="score">점수 (0~100)</label>
            <input type="number" id="score" placeholder="예) 87" min="0" max="100"/>
          </div>
          <div class="form-group">
            <label for="grade">등급 (1~9)</label>
            <select id="grade">
              <option value="">-- 선택 --</option>
              <option value="1">1등급</option>
              <option value="2">2등급</option>
              <option value="3">3등급</option>
              <option value="4">4등급</option>
              <option value="5">5등급</option>
              <option value="6">6등급</option>
              <option value="7">7등급</option>
              <option value="8">8등급</option>
              <option value="9">9등급</option>
            </select>
          </div>
          <div class="form-group">
            <label for="wrongCount">틀린 문항 수</label>
            <input type="number" id="wrongCount" placeholder="예) 5" min="0"/>
          </div>
        </div>

        <div class="form-group full">
          <label for="wrongNums">틀린 문항 번호</label>
          <input type="text" id="wrongNums" placeholder="예) 3, 7, 15, 22, 30"/>
        </div>

        <div class="form-group full">
          <label>풀이 상태</label>
          <div class="radio-group">
            <label><input type="radio" name="status" value="완료"/> ✅ 완료</label>
            <label><input type="radio" name="status" value="오답 진행중"/> 🔄 오답 진행중</label>
            <label><input type="radio" name="status" value="미완료"/> ❌ 미완료</label>
          </div>
        </div>

        <div class="form-group full">
          <label for="reflection">반성할 점 / 메모</label>
          <textarea id="reflection" placeholder="이번 모의고사에서 느낀 점, 반성 사항, 다음에 주의할 점 등을 자유롭게 기록하세요."></textarea>
        </div>

      </div>
      <button class="btn-submit" id="btnSubmit" onclick="addRecord()">기록 저장하기</button>
    </div>
  </div>

  <!-- ══════════════ 기록 보기 ══════════════ -->
  <div id="tab-list" class="tab-panel">
    <div class="filter-bar">
      <span class="filter-label">필터:</span>
      <select id="filterExam" onchange="renderList()">
        <option value="">모든 모의고사</option>
      </select>
      <select id="filterSubject" onchange="renderList()">
        <option value="">모든 과목</option>
        <option>국어</option><option>수학</option><option>영어</option>
        <option>한국사</option><option>사회탐구</option><option>과학탐구</option>
        <option>직업탐구</option><option>제2외국어/한문</option><option>기타</option>
      </select>
      <select id="filterStatus" onchange="renderList()">
        <option value="">모든 상태</option>
        <option>완료</option><option>오답 진행중</option><option>미완료</option>
      </select>
      <select id="filterGrade" onchange="renderList()">
        <option value="">모든 등급</option>
        <option value="1">1등급</option><option value="2">2등급</option>
        <option value="3">3등급</option><option value="4">4등급</option>
        <option value="5">5등급</option><option value="6">6등급</option>
        <option value="7">7등급</option><option value="8">8등급</option>
        <option value="9">9등급</option>
      </select>
      <select id="groupBy" onchange="renderList()">
        <option value="exam">모의고사명으로 묶기</option>
        <option value="subject">과목으로 묶기</option>
        <option value="none">묶지 않기</option>
      </select>
    </div>
    <div id="listArea"><p class="empty-msg">불러오는 중...</p></div>
  </div>

  <!-- ══════════════ 통계 ══════════════ -->
  <div id="tab-stats" class="tab-panel">
    <div class="summary-row" id="statsCards"></div>
    <div id="statsDetail"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   Supabase 초기화
══════════════════════════════════════ */
const SUPABASE_URL = 'https://gbropciowpwvdgxobwis.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pSR12ELoN6FYx-MqJ-PkRg_64Pu0lV_';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE = 'mock_exam_records';

/* ══════════════════════════════════════
   토스트
══════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

/* ══════════════════════════════════════
   탭 전환
══════════════════════════════════════ */
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = ['tab-add', 'tab-list', 'tab-stats'].indexOf(id);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (id === 'tab-list')  { updateFilters().then(() => renderList()); }
  if (id === 'tab-stats') { renderStats(); }
}

/* ══════════════════════════════════════
   기록 추가
══════════════════════════════════════ */
async function addRecord() {
  const examName   = document.getElementById('examName').value.trim();
  const examRound  = document.getElementById('examRound').value.trim();
  const subject    = document.getElementById('subject').value;
  const score      = document.getElementById('score').value;
  const grade      = document.getElementById('grade').value;
  const wrongCount = document.getElementById('wrongCount').value;
  const wrongNums  = document.getElementById('wrongNums').value.trim();
  const statusEl   = document.querySelector('input[name="status"]:checked');
  const reflection = document.getElementById('reflection').value.trim();
  const examDate   = document.getElementById('examDate').value;

  if (!examName)  { showToast('⚠️ 모의고사 이름을 입력해주세요.', true); return; }
  if (!examRound) { showToast('⚠️ 회차를 입력해주세요.', true); return; }
  if (!subject)   { showToast('⚠️ 과목을 선택해주세요.', true); return; }
  if (!statusEl)  { showToast('⚠️ 풀이 상태를 선택해주세요.', true); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>저장 중...';

  const { error } = await sb.from(TABLE).insert([{
    exam_name:   examName,
    exam_round:  parseInt(examRound),
    subject:     subject,
    score:       score      !== '' ? parseInt(score)      : null,
    grade:       grade      !== '' ? parseInt(grade)      : null,
    wrong_count: wrongCount !== '' ? parseInt(wrongCount) : null,
    wrong_nums:  wrongNums  || null,
    status:      statusEl.value,
    reflection:  reflection || null,
    exam_date:   examDate   || null,
  }]);

  btn.disabled = false;
  btn.innerHTML = '기록 저장하기';

  if (error) {
    showToast('❌ 저장 실패: ' + error.message, true);
    return;
  }

  showToast('✅ 기록이 저장되었습니다!');
  resetForm();
  updateExamNameDatalist();
}

function resetForm() {
  ['examName','examRound','score','wrongCount','wrongNums','reflection','examDate']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('subject').value = '';
  document.getElementById('grade').value = '';
  const checked = document.querySelector('input[name="status"]:checked');
  if (checked) checked.checked = false;
}

/* ══════════════════════════════════════
   Datalist (모의고사명 자동완성)
══════════════════════════════════════ */
async function updateExamNameDatalist() {
  const { data } = await sb.from(TABLE).select('exam_name');
  if (!data) return;
  const names = [...new Set(data.map(r => r.exam_name))];
  const dl = document.getElementById('examNameList');
  dl.innerHTML = names.map(n => `<option value="${esc(n)}"></option>`).join('');
}

/* ══════════════════════════════════════
   필터 select 갱신
══════════════════════════════════════ */
async function updateFilters() {
  const { data } = await sb.from(TABLE).select('exam_name');
  if (!data) return;
  const names = [...new Set(data.map(r => r.exam_name))].sort((a,b) => a.localeCompare(b,'ko'));
  const sel = document.getElementById('filterExam');
  const cur = sel.value;
  sel.innerHTML = '<option value="">모든 모의고사</option>' +
    names.map(n => `<option ${n===cur?'selected':''} value="${esc(n)}">${esc(n)}</option>`).join('');
}

/* ══════════════════════════════════════
   기록 목록 렌더
══════════════════════════════════════ */
async function renderList() {
  const area = document.getElementById('listArea');
  area.innerHTML = '<p class="empty-msg">불러오는 중...</p>';

  const fExam   = document.getElementById('filterExam').value;
  const fSubj   = document.getElementById('filterSubject').value;
  const fStatus = document.getElementById('filterStatus').value;
  const fGrade  = document.getElementById('filterGrade').value;
  const groupBy = document.getElementById('groupBy').value;

  let query = sb.from(TABLE).select('*').order('exam_name').order('exam_round').order('subject');
  if (fExam)   query = query.eq('exam_name', fExam);
  if (fSubj)   query = query.eq('subject', fSubj);
  if (fStatus) query = query.eq('status', fStatus);
  if (fGrade)  query = query.eq('grade', parseInt(fGrade));

  const { data, error } = await query;

  if (error) {
    area.innerHTML = `<p class="empty-msg" style="color:#c0392b;">오류: ${error.message}</p>`;
    return;
  }
  if (!data || !data.length) {
    area.innerHTML = '<p class="empty-msg">조건에 맞는 기록이 없습니다.</p>';
    return;
  }

  let html = '';

  if (groupBy === 'none') {
    html = `<div class="group-block"><div class="group-body">${data.map(recordCardHtml).join('')}</div></div>`;
  } else {
    const keyFn = groupBy === 'exam' ? r => r.exam_name : r => r.subject;
    const groups = {};
    data.forEach(r => {
      const k = keyFn(r);
      if (!groups[k]) groups[k] = [];
      groups[k].push(r);
    });

    Object.entries(groups).sort((a,b) => a[0].localeCompare(b[0],'ko')).forEach(([key, items]) => {
      const avg = avgScore(items);
      const avgG = avgGrade(items);
      const tw  = items.reduce((s,r) => s + (r.wrong_count ?? 0), 0);
      const metaStr = `${items.length}건 · 평균 ${avg}점 · 평균 ${avgG}등급 · 오답합계 ${tw}문`;
      html += `
      <div class="group-block">
        <div class="group-header" onclick="toggleGroup(this)">
          <h3>${esc(key)}</h3>
          <span class="g-meta">${metaStr}</span>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="group-body">${items.map(recordCardHtml).join('')}</div>
      </div>`;
    });
  }

  area.innerHTML = html;
}

function toggleGroup(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('hidden');
}

function recordCardHtml(r) {
    const statusBadge =
      r.status === '완료'
        ? `<span class="badge badge-done">✅ 완료</span>`
        : r.status === '오답 진행중'
        ? `<span class="badge badge-partial">🔄 오답 중</span>`
        : `<span class="badge badge-undone">❌ 미완료</span>`;

    const gradeBadge = r.grade
      ? `<span class="badge badge-grade">${r.grade}등급</span>`
      : '';

    const scoreStr  = r.score       != null ? `<span><strong>점수</strong> ${r.score}점</span>` : '';
    const gradeStr  = r.grade       != null ? `<span><strong>등급</strong> ${r.grade}등급</span>` : '';
    const wrongStr  = r.wrong_count != null ? `<span><strong>틀린 문항</strong> ${r.wrong_count}문제</span>` : '';
    const numsStr   = r.wrong_nums  ? `<span><strong>번호</strong> ${esc(r.wrong_nums)}</span>` : '';
    const dateStr   = r.exam_date   ? `<span><strong>날짜</strong> ${r.exam_date}</span>` : '';
    const reflHtml  = r.reflection
      ? `<div class="record-reflection">${esc(r.reflection)}</div>`
      : '';

    return `
    <div class="record-card" id="rec-${r.id}">
      <div class="record-top">
        <span class="record-title">${esc(r.exam_name)} ${r.exam_round}회 · ${esc(r.subject)}</span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <div class="record-badges">
            ${statusBadge}
            ${gradeBadge}
            <span class="badge badge-subject">${esc(r.subject)}</span>
          </div>
          <button class="btn-delete" onclick="deleteRecord(${r.id})">삭제</button>
        </div>
      </div>
      <div class="record-meta">${scoreStr}${gradeStr}${wrongStr}${numsStr}${dateStr}</div>
      ${reflHtml}
    </div>`;
  }

/* ══════════════════════════════════════
   기록 삭제
══════════════════════════════════════ */
  async function deleteRecord(id) {
    if (!confirm('이 기록을 삭제하시겠습니까?')) return;

    const { error } = await sb.from(TABLE).delete().eq('id', id);
    if (error) {
      showToast('❌ 삭제 실패: ' + error.message, true);
      return;
    }
    showToast('🗑️ 기록이 삭제되었습니다.');
    await updateFilters();
    await renderList();
  }

/* ══════════════════════════════════════
   통계 렌더
══════════════════════════════════════ */
  async function renderStats() {
    document.getElementById('statsCards').innerHTML = '<p class="empty-msg">불러오는 중...</p>';
    document.getElementById('statsDetail').innerHTML = '';

    const { data, error } = await sb.from(TABLE).select('*');
    if (error || !data || !data.length) {
      document.getElementById('statsCards').innerHTML =
        '<p class="empty-msg">저장된 기록이 없습니다.</p>';
      return;
    }

    const total      = data.length;
    const done       = data.filter(r => r.status === '완료').length;
    const avg        = avgScore(data);
    const avgG       = avgGrade(data);
    const totalWrong = data.reduce((s, r) => s + (r.wrong_count ?? 0), 0);
    const doneRate   = Math.round(done / total * 100);

    document.getElementById('statsCards').innerHTML = `
      <div class="summary-card">
        <div class="s-label">총 기록</div>
        <div class="s-value">${total}건</div>
      </div>
      <div class="summary-card">
        <div class="s-label">완료율</div>
        <div class="s-value">${doneRate}%</div>
      </div>
      <div class="summary-card">
        <div class="s-label">전체 평균 점수</div>
        <div class="s-value">${avg}점</div>
      </div>
      <div class="summary-card">
        <div class="s-label">전체 평균 등급</div>
        <div class="s-value">${avgG}등급</div>
      </div>
      <div class="summary-card">
        <div class="s-label">총 오답 수</div>
        <div class="s-value">${totalWrong}문</div>
      </div>
    `;

    /* 과목별 통계 */
    const bySubject = groupBy(data, r => r.subject);
    /* 모의고사명별 통계 */
    const byExam = groupBy(data, r => r.exam_name);

    let detail = '';
    detail += `<p class="section-title" style="margin-bottom:12px;">📚 과목별 통계</p>`;
    detail += buildStatTable(bySubject);
    detail += `<p class="section-title" style="margin:28px 0 12px;">📝 모의고사별 통계</p>`;
    detail += buildStatTable(byExam);

    document.getElementById('statsDetail').innerHTML = detail;
  }

  function buildStatTable(groupObj) {
    let rows = '';
    Object.entries(groupObj)
      .sort((a, b) => a[0].localeCompare(b[0], 'ko'))
      .forEach(([key, items]) => {
        const avg   = avgScore(items);
        const avgG  = avgGrade(items);
        const tw    = items.reduce((s, r) => s + (r.wrong_count ?? 0), 0);
        const dr    = Math.round(items.filter(r => r.status === '완료').length / items.length * 100);
        rows += `
        <tr>
          <td>${esc(key)}</td>
          <td>${items.length}</td>
          <td>${avg}점</td>
          <td>${avgG}등급</td>
          <td>${tw}문</td>
          <td>${dr}%</td>
        </tr>`;
      });

    return `
    <div class="stat-table-wrap">
      <table class="stat-table">
        <thead>
          <tr>
            <th>항목</th>
            <th>기록 수</th>
            <th>평균 점수</th>
            <th>평균 등급</th>
            <th>총 오답</th>
            <th>완료율</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

/* ══════════════════════════════════════
   유틸 함수
══════════════════════════════════════ */
  function groupBy(arr, keyFn) {
    const result = {};
    arr.forEach(r => {
      const k = keyFn(r);
      if (!result[k]) result[k] = [];
      result[k].push(r);
    });
    return result;
  }

  function avgScore(arr) {
    const valid = arr.filter(r => r.score != null);
    if (!valid.length) return '—';
    return Math.round(valid.reduce((s, r) => s + r.score, 0) / valid.length);
  }

  function avgGrade(arr) {
    const valid = arr.filter(r => r.grade != null);
    if (!valid.length) return '—';
    return (valid.reduce((s, r) => s + r.grade, 0) / valid.length).toFixed(1);
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

/* ══════════════════════════════════════
   초기 실행
══════════════════════════════════════ */
  (async function init() {
    await updateExamNameDatalist();
    // 오늘 날짜 기본값
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('examDate').value = today;
  })();

</script>
